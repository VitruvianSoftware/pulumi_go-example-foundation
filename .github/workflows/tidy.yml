# go.sum regeneration for the mirror. This repo is a one-way read-only mirror of
# vitruvian-core/pulumi/examples/go-foundation/. The Copybara export rewrites each
# stage go.mod (strips the in-tree `replace => ../../../library/...` directives and
# repoints go/pkg/* to published versions) but cannot recompute Go module hashes,
# so this workflow runs `go mod tidy` per stage against the module proxy and commits
# the regenerated go.mod/go.sum. go.sum is standalone_only in the export, so a later
# export never clobbers it. Idempotent: it only commits when tidy changed something.
name: tidy-go-sum

on:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: tidy-go-sum-${{ github.ref }}
    cancel-in-progress: false

jobs:
    tidy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.26.2"

            - name: go mod tidy each module + commit regenerated go.sum
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  for gomod in $(git ls-files '*go.mod'); do
                    d="$(dirname "$gomod")"
                    echo "::group::go mod tidy $d"
                    ( cd "$d" && GOWORK=off GOFLAGS=-mod=mod go mod tidy )
                    echo "::endgroup::"
                  done
                  git add -A -- '*go.mod' '*go.sum'
                  if git diff --cached --quiet; then
                    echo "go.mod/go.sum already tidy — nothing to commit."
                  else
                    git commit -m "chore: go mod tidy (regenerate go.sum for published library versions)"
                    git push
                  fi
